      x_months:
        one: "1 mês"
        other: "%{count} meses"

      about_x_years:
        one: "1 ano"
        other: "%{count} anos"

      over_x_years:
        one: "mais de 1 ano"
        other: "mais de %{count} anos"

  simple_calendar:
